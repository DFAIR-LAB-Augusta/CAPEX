name: style

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  ruff-style:
    runs-on: [self-hosted, dfair-gha-runner]

    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Show bootstrap Python and uv
        run: |
          python3 --version
          which python3
          uv --version

      - name: Install requested Python
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --frozen --python ${{ matrix.python-version }}

      - name: Ruff format
        run: uv run --python ${{ matrix.python-version }} ruff format --check .

      - name: Ruff lint
        run: uv run --python ${{ matrix.python-version }} ruff check .
name: Tests

on:
  pull_request:
  push:
    branches: ["main"]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: [self-hosted, dfair-gha-runner]

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Show bootstrap Python and uv
        run: |
          python3 --version
          which python3
          uv --version

      - name: Install requested Python
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dev dependencies
        run: uv sync --dev --python ${{ matrix.python-version }}

      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest -q

      - name: Build artifacts
        run: uv build --python ${{ matrix.python-version }}